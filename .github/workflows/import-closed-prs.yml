name: Import Closed PRs to Notion

# 수동으로 워크플로우를 실행할 수 있게 해주는 트리거입니다.
on:
  workflow_dispatch: 

jobs:
  import-prs:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch and Sync Closed PRs
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # GitHub에서 기본 제공하는 토큰
          REPO: ${{ github.repository }}
        run: |
          echo "GitHub API에서 Closed PR 데이터를 가져오는 중..."
          
          # 1. 최근 Closed PR 100개 가져오기 (필요시 per_page 조절)
          PRS=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/$REPO/pulls?state=closed&per_page=100")
          
          # 2. 배열 길이(PR 개수) 확인
          PR_COUNT=$(echo "$PRS" | jq '. | length')
          echo "총 $PR_COUNT 개의 Closed PR을 발견했습니다."
          
          if [ "$PR_COUNT" -eq 0 ]; then
            echo "가져올 PR이 없습니다."
            exit 0
          fi

          # 3. 반복문으로 Notion API에 쏘기
          echo "$PRS" | jq -c '.[]' | while read pr; do
            TITLE=$(echo "$pr" | jq -r '.title')
            URL=$(echo "$pr" | jq -r '.html_url')
            AUTHOR=$(echo "$pr" | jq -r '.user.login')
            BODY=$(echo "$pr" | jq -r '.body // "본문 없음"')
            
            # Notion 2000자 텍스트 제한 방어 및 JSON 이스케이프 처리
            ESCAPED_BODY=$(echo "$BODY" | cut -c 1-1990 | jq -Rsa .)
            
            JSON_PAYLOAD=$(cat <<EOF
            {
              "parent": { "database_id": "$NOTION_DATABASE_ID" },
              "properties": {
                "이름": { "title": [ { "text": { "content": "$TITLE" } } ] },
                "URL": { "url": "$URL" },
                "작성자": { "rich_text": [ { "text": { "content": "$AUTHOR" } } ] }
              },
              "children": [
                {
                  "object": "block",
                  "type": "paragraph",
                  "paragraph": {
                    "rich_text": [ { "text": { "content": ${ESCAPED_BODY} } } ]
                  }
                }
              ]
            }
          EOF
            )
            
            echo "Notion에 기록 중: $TITLE"
            
            # API 호출 (상태 코드 출력)
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST https://api.notion.com/v1/pages \
              -H "Authorization: Bearer $NOTION_TOKEN" \
              -H "Content-Type: application/json" \
              -H "Notion-Version: 2022-06-28" \
              -d "$JSON_PAYLOAD")
              
            if [ "$HTTP_STATUS" -eq 200 ]; then
              echo "✅ 성공"
            else
              echo "❌ 실패 (HTTP $HTTP_STATUS)"
            fi
              
            # Notion API 초당 호출 제한 방지
            sleep 0.5
          done
