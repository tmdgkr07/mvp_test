name: PR to Notion

on:
  pull_request:
    types: [opened]

jobs:
  sync-to-notion:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install requests

      - name: Send PR details to Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          NOTION_DATA_SOURCE_ID: ${{ secrets.NOTION_DATA_SOURCE_ID }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          python -c '
          import os
          import requests

          NOTION_VERSION = "2025-09-03"

          notion_token = os.environ.get("NOTION_TOKEN")
          database_id = os.environ.get("NOTION_DATABASE_ID")
          data_source_id = os.environ.get("NOTION_DATA_SOURCE_ID")
          title = os.environ.get("PR_TITLE", "No Title")
          url = os.environ.get("PR_URL", "")
          author = os.environ.get("PR_AUTHOR", "Unknown")
          body = os.environ.get("PR_BODY", "")

          notion_headers = {
              "Authorization": f"Bearer {notion_token}",
              "Content-Type": "application/json",
              "Notion-Version": NOTION_VERSION,
          }

          def parse_markdown(text):
              if not text:
                  return [
                      {
                          "object": "block",
                          "type": "paragraph",
                          "paragraph": {
                              "rich_text": [{"text": {"content": "No description provided"}}]
                          },
                      }
                  ]

              blocks = []
              for line in text.split("\n")[:100]:
                  line = line.strip()
                  if not line:
                      continue
                  if line.startswith("### "):
                      blocks.append(
                          {
                              "object": "block",
                              "type": "heading_3",
                              "heading_3": {"rich_text": [{"text": {"content": line[4:]}}]},
                          }
                      )
                  elif line.startswith("## "):
                      blocks.append(
                          {
                              "object": "block",
                              "type": "heading_2",
                              "heading_2": {"rich_text": [{"text": {"content": line[3:]}}]},
                          }
                      )
                  elif line.startswith("# "):
                      blocks.append(
                          {
                              "object": "block",
                              "type": "heading_1",
                              "heading_1": {"rich_text": [{"text": {"content": line[2:]}}]},
                          }
                      )
                  elif line.startswith("- ") or line.startswith("* "):
                      blocks.append(
                          {
                              "object": "block",
                              "type": "bulleted_list_item",
                              "bulleted_list_item": {
                                  "rich_text": [{"text": {"content": line[2:]}}]
                              },
                          }
                      )
                  else:
                      blocks.append(
                          {
                              "object": "block",
                              "type": "paragraph",
                              "paragraph": {"rich_text": [{"text": {"content": line}}]},
                          }
                      )
              return blocks

          def get_data_source_fields(current_data_source_id):
              response = requests.get(
                  f"https://api.notion.com/v1/data_sources/{current_data_source_id}",
                  headers=notion_headers,
                  timeout=30,
              )
              if response.status_code != 200:
                  raise SystemExit(f"Failed to retrieve Notion data source: {response.text}")

              properties = response.json().get("properties") or {}
              title_property = None
              url_candidates = []
              rich_text_candidates = []

              for property_name, property_data in properties.items():
                  property_type = property_data.get("type")
                  lowered = property_name.lower()

                  if property_type == "title" and not title_property:
                      title_property = property_name
                  elif property_type == "url":
                      rank = 0 if "url" in lowered or "link" in lowered else 1
                      url_candidates.append((rank, property_name))
                  elif property_type == "rich_text":
                      rank = 0 if "author" in lowered or "writer" in lowered else 1
                      rich_text_candidates.append((rank, property_name))

              if not title_property or not url_candidates or not rich_text_candidates:
                  return None

              url_property = sorted(url_candidates)[0][1]
              author_property = sorted(rich_text_candidates)[0][1]

              return {
                  "title": title_property,
                  "url": url_property,
                  "author": author_property,
              }

          def resolve_page_target():
              if data_source_id:
                  fields = get_data_source_fields(data_source_id)
                  if not fields:
                      raise SystemExit(
                          "NOTION_DATA_SOURCE_ID must point to a data source with title, url, and rich_text properties."
                      )
                  return {"data_source_id": data_source_id}, fields

              if not database_id:
                  raise SystemExit("NOTION_DATABASE_ID or NOTION_DATA_SOURCE_ID is required.")

              response = requests.get(
                  f"https://api.notion.com/v1/databases/{database_id}",
                  headers=notion_headers,
                  timeout=30,
              )
              if response.status_code != 200:
                  raise SystemExit(f"Failed to retrieve Notion database: {response.text}")

              matches = []
              data_sources = response.json().get("data_sources", [])

              for item in data_sources:
                  current_data_source_id = item.get("id")
                  if not current_data_source_id:
                      continue

                  fields = get_data_source_fields(current_data_source_id)
                  if fields:
                      matches.append(
                          {
                              "id": current_data_source_id,
                              "name": item.get("name") or "Untitled",
                              "fields": fields,
                          }
                      )

              if len(matches) == 1:
                  match = matches[0]
                  return {"data_source_id": match["id"]}, match["fields"]

              available = ", ".join(
                  f"{item.get(\"name\") or \"Untitled\"}: {item.get(\"id\")}"
                  for item in data_sources
              ) or "none"

              if not matches:
                  raise SystemExit(
                      "No compatible Notion data source was found under NOTION_DATABASE_ID. "
                      f"Set NOTION_DATA_SOURCE_ID explicitly. Available data sources: {available}"
                  )

              compatible = ", ".join(f"{item[\"name\"]}: {item[\"id\"]}" for item in matches)
              raise SystemExit(
                  "Multiple compatible Notion data sources were found. "
                  f"Set NOTION_DATA_SOURCE_ID to one of: {compatible}. Available data sources: {available}"
              )

          notion_parent, field_names = resolve_page_target()
          page_properties = {
              field_names["title"]: {"title": [{"text": {"content": title}}]},
              field_names["url"]: {"url": url},
              field_names["author"]: {"rich_text": [{"text": {"content": author}}]},
          }

          payload = {
              "parent": notion_parent,
              "properties": page_properties,
              "children": parse_markdown(body),
          }

          print("Using Notion data source:", notion_parent["data_source_id"])
          response = requests.post(
              "https://api.notion.com/v1/pages",
              headers=notion_headers,
              json=payload,
              timeout=30,
          )

          if response.status_code != 200:
              print(f"Notion request failed: {response.text}")
              raise SystemExit(1)
          '
