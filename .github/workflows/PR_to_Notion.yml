name: PR to Notion

on:
  pull_request:
    types: [opened] # PR이 새로 열렸을 때만 작동

jobs:
  sync-to-notion:
    runs-on: ubuntu-latest
    steps:
      - name: Send PR details to Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          # PR 본문에서 줄바꿈 및 특수문자를 JSON 포맷에 맞게 이스케이프 처리
          ESCAPED_BODY=$(echo "$PR_BODY" | jq -Rsa .)
          
          # Notion API로 보낼 JSON 데이터 구성
          JSON_PAYLOAD=$(cat <<EOF
          {
            "parent": { "database_id": "$NOTION_DATABASE_ID" },
            "properties": {
              "이름": {
                "title": [
                  { "text": { "content": "$PR_TITLE" } }
                ]
              },
              "URL": {
                "url": "$PR_URL"
              },
              "작성자": {
                "rich_text": [
                  { "text": { "content": "$PR_AUTHOR" } }
                ]
              }
            },
            "children": [
              {
                "object": "block",
                "type": "paragraph",
                "paragraph": {
                  "rich_text": [
                    { "text": { "content": ${ESCAPED_BODY:-"\"본문 없음\""} } }
                  ]
                }
              }
            ]
          }
          EOF
          )

          # Notion API 호출
          curl -X POST https://api.notion.com/v1/pages \
            -H "Authorization: Bearer $NOTION_TOKEN" \
            -H "Content-Type: application/json" \
            -H "Notion-Version: 2022-06-28" \
            -d "$JSON_PAYLOAD"
